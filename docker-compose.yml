version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MODEL_PATH=models/best_model.pkl
      - PREPROCESSOR_PATH=models/preprocessor.pkl
      - FLASK_ENV=production
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run app/streamlit/app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  mlflow:
    image: mlflow/mlflow:latest
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana-storage:
